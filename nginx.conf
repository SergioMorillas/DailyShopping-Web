server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy Backend (auth + listas) ────────────────────────────────────────
    location /api/auth {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/listas {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/stats {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Proxy Mercadona (Algolia, POST) ──────────────────────────────────────
    location /api/mercadona {
        proxy_pass https://7uzjkl1dj0-dsn.algolia.net/1/indexes/products_prod_4315_es/query?x-algolia-application-id=7UZJKL1DJ0&x-algolia-api-key=9d8f2e39e90df472b4f2e559a116fe17;
        proxy_ssl_server_name on;
        proxy_set_header Host "7uzjkl1dj0-dsn.algolia.net";
        proxy_set_header Content-Type "application/json";
        proxy_set_header Accept "application/json";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Proxy Alcampo ────────────────────────────────────────────────────────
    location /api/alcampo {
        rewrite ^/api/alcampo(.*)$ /api/webproductpagews/v6/product-pages/search$1 break;
        proxy_pass https://www.compraonline.alcampo.es;
        proxy_ssl_server_name on;
        proxy_set_header Host "www.compraonline.alcampo.es";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Proxy Dia ────────────────────────────────────────────────────────────
    location /api/dia {
        rewrite ^/api/dia(.*)$ /api/v1/search-back/search/reduced$1 break;
        proxy_pass https://www.dia.es;
        proxy_ssl_server_name on;
        proxy_set_header Host "www.dia.es";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Proxy BM ─────────────────────────────────────────────────────────────
    location /api/bm {
        rewrite ^/api/bm(.*)$ /api/rest/V1.0/catalog/searcher/products$1 break;
        proxy_pass https://www.online.bmsupermercados.es;
        proxy_ssl_server_name on;
        proxy_set_header Host "www.online.bmsupermercados.es";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Proxy Carrefour ──────────────────────────────────────────────────────
    location /api/carrefour {
        rewrite ^/api/carrefour(.*)$ /search-api/query/v1/search$1 break;
        proxy_pass https://www.carrefour.es;
        proxy_ssl_server_name on;
        proxy_set_header Host "www.carrefour.es";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
